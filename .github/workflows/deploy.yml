name: Deploy

on:
  push:
    branches:
      - main  # Render deploys automatically when this check passes

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # install .NET 10 — not pre-installed on the runner
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Test
      run: dotnet test
