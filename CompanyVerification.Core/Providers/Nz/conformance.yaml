# Conformance file for the NZBN adapter.
# Filter rules and additional fields are NZ-specific.

# Identifier for this adapter.
adapter: nzbn

# Country this adapter serves. ISO 3166-1 alpha-2 code.
country: NZ

# Status codes treated as active. All other codes are excluded.
# Codes come from the NZBN API.
active_statuses:
  - "50"  # Registered

# Entity types included in results. All other types are excluded.
# Codes come from the NZBN API.
included_entity_types:
  - NZCompany
  - LTD
  - ULTD
  - COOP
  - OverseasCompany
  - ASIC
  - NON_ASIC
  - LimitedPartnershipNz
  - LimitedPartnershipOverseas
  - IncorporatedSociety
  - IndustrialAndProvidentSociety
  - BuildingSociety
  - CreditUnion
  - FriendlySociety
  - CharitableTrust
  - Trust
  - Trading_Trust
  - SpecialBody
  - SpecialBodies
  - GovtCentral
  - GovtLocal
  - GovtEdu
  - GovtOther

# Keys this adapter sets in CompanyCandidate.AdditionalFields.
# Other adapters may not set these keys.
#
# Schema:
#   source:      api_response = read from the API response, do not hardcode
#                adapter      = generated by the adapter at call time
#   type:        .NET type (all values are stored as strings in AdditionalFields)
#   format:      value format where relevant
#   description: what the value contains and how it is obtained
#   required_by: compliance clause requiring this field
additional_fields:

  source_register:
    source: api_response
    type: string
    description: Source register name as returned by the NZBN API (e.g. "Companies Register")
    required_by: MBIE API Access Agreement clause 4.8

  searched_at:
    source: adapter
    type: string
    format: ISO 8601 with timezone offset (e.g. "2026-06-04T14:32:00+12:00")
    description: Timestamp recorded by the adapter when the HTTP call was made, not page load
    required_by: MBIE API Access Agreement clause 4.8
